<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEdit} ? 'Edit Profile' : 'New Identity'">Customer Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .form-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .form-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.6s ease forwards;
        }

        .form-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .form-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c4b5fd, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 0.5rem 0;
        }

        .form-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            margin: 0;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            flex: 1;
            border: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="glow-orb" style="background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 60%);"></div>

<div class="form-wrapper">
    <div class="form-card">
        
        <div class="form-header">
            <h1 class="form-title" th:text="${isEdit} ? 'Update Identity' : 'Register Identity'">Form</h1>
            <p class="form-subtitle" th:text="${isEdit} ? 'Modify personal profile parameters natively' : 'Establish a new customer securely'">Description</p>
        </div>

        <div th:if="${error}" class="error-banner">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{${isEdit} ? '/frontend/customers/' + ${customer.customerId} + '/edit' : '/frontend/customers'}" 
              th:object="${customer}" method="post">
            
            <div class="input-grid">
                
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input class="form-input" type="text" th:field="*{fullName}" required placeholder="Sarah Jenkins" />
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input class="form-input" type="email" th:field="*{emailAddress}" required placeholder="user@domain.com" />
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/team}" class="btn btn-cancel" style="flex: 0.5; font-size: 0.85rem;">&larr; Team</a>
                <a th:href="@{/frontend/customers}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-submit" th:text="${isEdit} ? 'Confirm Changes' : 'Register Customer'">Submit</button>
            </div>
        </form>
        
    </div>
</div>
</body>
</html>
