<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .details-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .details-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.6s ease forwards;
        }

        .details-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .avatar-circle {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-family: 'Syne', sans-serif; font-weight: bold; color: white;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 10px 20px -5px rgba(139,92,246,0.5);
        }

        .details-title {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .badge-email {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(59, 130, 246, 0.1);
            color: #93c5fd;
            border: 1px dashed rgba(59,130,246,0.3);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .details-grid {
            margin-bottom: 2rem;
            display: flex; flex-direction: column; gap: 1rem;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .detail-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f1f5f9;
        }

        .btn-flex {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .btn-outline {
            border: 1px solid rgba(148, 163, 184, 0.4);
            color: #cbd5e1;
            background: transparent;
        }

        .btn-outline:hover {
            border-color: #f1f5f9;
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .btn-edit {
            background: rgba(252, 211, 77, 0.1);
            color: #fcd34d;
            border: 1px solid rgba(252, 211, 77, 0.4);
        }

        .btn-edit:hover {
            background: rgba(252, 211, 77, 0.2);
            color: #fff;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="glow-orb" style="background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 60%);"></div>
<div class="details-wrapper">
    <div class="details-card">
        
        <div class="details-header">
            <div style="position: absolute; top: 0; left: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #64748b;">
                ID_REF: <span th:text="${customer.customerId}">1</span>
            </div>
            
            <div class="avatar-circle" th:text="${customer.fullName != null && customer.fullName.length() > 0 ? customer.fullName.substring(0,1).toUpperCase() : 'C'}">C</div>
            <h1 class="details-title" th:text="${customer.fullName}">Customer Name</h1>
            <span class="badge-email" th:text="${customer.emailAddress}">email@domain.com</span>
        </div>

        <div class="details-grid">
            <div class="detail-item">
                <span class="detail-label">ID</span>
                <span class="detail-value" style="font-family: 'JetBrains Mono', monospace; color: #a78bfa;" th:text="${customer.customerId}">123</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">EMAIL</span>
                <span class="detail-value" th:text="${customer.emailAddress}">valid@mail.com</span>
            </div>
        </div>

        <div class="btn-flex">
            <a th:href="@{/team}" class="btn btn-outline" style="font-size: 0.85rem; padding: 0.8rem 1rem;">&larr; Team</a>
            <a th:href="@{/frontend/customers}" class="btn btn-outline">&larr; Directory</a>
            <a th:href="@{/frontend/customers/{id}/edit(id=${customer.customerId})}" class="btn btn-edit">Modify Record</a>
        </div>
        
    </div>
</div>
</body>
</html>
