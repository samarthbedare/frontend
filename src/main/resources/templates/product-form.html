<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEdit} ? 'Edit Product' : 'Create Product'">Product Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .form-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        .form-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.6s ease forwards;
        }

        .form-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .form-subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            color: #93c5fd;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.9rem 1rem;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 1rem;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-submit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 10px 20px -10px rgba(16, 185, 129, 0.5);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #059669, #047857);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(148, 163, 184, 0.4);
            color: #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-color: #f1f5f9;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="glow-orb"></div>
<div class="form-wrapper">
    <div class="form-card">
        
        <h1 class="form-title" th:text="${isEdit} ? 'Edit Catalog Entry' : 'New Catalog Entry'">Form</h1>
        <p class="form-subtitle" th:text="${isEdit} ? 'Modifying existing data' : 'Integrate a new product into the database'">Subtitle</p>

        <form th:action="${isEdit} ? @{/frontend/products/{id}/edit(id=${product.productId})} : @{/frontend/products}" 
              th:object="${product}" method="post">
            
            <div class="input-grid">
                
                <div class="form-group full-width">
                    <label class="form-label">Product Name</label>
                    <input class="form-input" type="text" th:field="*{productName}" required placeholder="Casual Denim Jacket" />
                </div>

                <div class="form-group">
                    <label class="form-label">Brand</label>
                    <input class="form-input" type="text" th:field="*{brand}" required placeholder="Brand Name" />
                </div>

                <div class="form-group">
                    <label class="form-label">Colour</label>
                    <select class="form-input" th:field="*{colour}" required style="appearance: none;">
                        <option value="RED">Red</option>
                        <option value="BLUE">Blue</option>
                        <option value="GREEN">Green</option>
                        <option value="BROWN">Brown</option>
                        <option value="BLACK">Black</option>
                        <option value="WHITE">White</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Size</label>
                    <input class="form-input" type="text" th:field="*{size}" required placeholder="S, M, L, XL" />
                </div>

                <div class="form-group">
                    <label class="form-label">Unit Price ($)</label>
                    <input class="form-input" type="number" step="0.01" th:field="*{unitPrice}" required placeholder="0.00" />
                </div>

                <div class="form-group">
                    <label class="form-label">Rating</label>
                    <input class="form-input" type="number" step="0.1" min="0" max="5" th:field="*{rating}" required placeholder="5.0" />
                </div>

            </div>

            <div class="form-actions">
                <a th:href="@{/team}" class="btn btn-cancel" style="flex: 0.5; font-size: 0.85rem;">&larr; Team</a>
                <a th:href="@{/frontend/products}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-submit" th:text="${isEdit} ? 'Update Product' : 'Publish Product'">Submit</button>
            </div>
        </form>
        
    </div>
</div>
</body>
</html>
