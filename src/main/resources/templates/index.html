<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title th:text="${projectName}">Order Inventory Management</title>

<style>

/* ===== BACKGROUND (your theme) ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #edf4ff);
}

/* ===== PAGE ===== */
.page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

/* ===== TITLE ===== */
.eyebrow {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #3b82f6;
    margin-bottom: 1rem;
}

.project-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 800;
    text-align: center;
    color: #0f172a;
    margin-bottom: 0.5rem;
}

.title-underline {
    width: 80px;
    height: 3px;
    background: #3b82f6;
    margin: 0 auto 2.5rem;
    border-radius: 2px;
}

/* ===== CARD ===== */
.members-card {
    background: #ffffff;
    border: 1px solid #dbeafe;
    border-radius: 12px;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

/* ===== CARD TITLE ===== */
.members-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 1.2rem;
}

/* ===== MEMBERS ===== */
.member-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid #e2e8f0;
}

.member-row:last-child {
    border-bottom: none;
}

.member-num {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: #3b82f6;
    width: 24px;
}

.member-name-text {
    font-size: 0.95rem;
    color: #0f172a;
    flex: 1;
}

.member-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3b82f6;
    opacity: 0.6;
}

/* ===== BUTTONS ===== */
.btn-wrap {
    margin-top: 2rem;
    display: flex;
    gap: 1.2rem;
}

/* PRIMARY BUTTON */
.btn-primary {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0.7rem 1.6rem;
    border-radius: 8px;
    background: #3b82f6;
    color: #fff;
    font-weight: 600;
    text-decoration: none;
    transition: 0.2s;
}

.btn-primary:hover {
    background: #2563eb;
}

/* SECONDARY BUTTON */
.btn-secondary {
    padding: 0.7rem 1.6rem;
    border-radius: 8px;
    font-weight: 600;
    background: #ffffff;
    border: 1px solid #cbd5e1;
    color: #334155;
    text-decoration: none;
    transition: 0.2s;
}

.btn-secondary:hover {
    background: #f1f5f9;
}

</style>
</head>

<body>

<div class="page">

<p class="eyebrow">Team Project · 2026</p>

<h1 class="project-title" th:text="${projectName}">Order Inventory Management</h1>
<div class="title-underline"></div>

<div class="members-card">
    <p class="members-label">Team Members</p>

    <div class="member-row" th:each="member : ${members}">
        <span class="member-num" th:text="${member.paddedNumber}">01</span>
        <span class="member-name-text" th:text="${member.name}">Member Name</span>
        <span class="member-dot"></span>
    </div>
</div>

<div class="btn-wrap">

<a th:href="@{/team}" class="btn-primary">
    Meet the Team →
</a>

<a th:href="@{/login}" class="btn-secondary">
    Admin Login
</a>

</div>

</div>

</body>
</html>
