<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${projectName} + ' — Team'">Team</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    /* ===== GLOBAL ===== */
    body {
        background: linear-gradient(135deg, #dbeafe, #eaf3ff);
        min-height: 100vh;
        color: #000;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
    }

    .wrapper {
        max-width: 800px;
        margin: 0 auto;
        padding: 4rem 1.5rem;
    }

    /* ===== BACK LINK ===== */
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: #64748b;
        text-decoration: none;
        font-weight: 600;
        margin-bottom: 2.5rem;
        transition: color 0.2s ease;
    }

    .back-link:hover {
        color: #1e293b;
    }

    /* ===== HEADER ===== */
    .page-header {
        margin-bottom: 3rem;
        text-align: center;
    }

    .page-eyebrow {
        color: #3b82f6;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.85rem;
        margin-bottom: 0.75rem;
    }

    .page-title {
        font-size: 2.5rem;
        font-weight: 800;
        color: #1e3a8a !important;
        background: none !important;
        -webkit-background-clip: initial !important;
        -webkit-text-fill-color: initial !important;
        margin: 0;
    }

    .title-bar {
        width: 60px;
        height: 4px;
        background: #3b82f6;
        margin: 1.5rem auto 0;
        border-radius: 2px;
    }

    /* ===== MEMBER CARD ===== */
    .member-card {
        background: #ffffff !important;
        border: 1px solid #dbeafe;
        border-radius: 16px;
        padding: 1.5rem 2rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 2rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        transform: none !important;
    }

    .member-card:hover {
        background: #ffffff !important;
        transform: none !important;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05) !important;
    }

    .avatar-wrap {
        position: relative;
    }

    .avatar {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid #3b82f6;
    }

    .member-info {
        flex: 1;
    }

    .member-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 0.25rem;
    }

    .member-role {
        color: #64748b;
        font-size: 0.9rem;
        font-weight: 500;
    }

    .work-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #3b82f6;
        border: 1px solid #3b82f6;
        color: #ffffff;
        padding: 0.6rem 1.2rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.85rem;
        transition: all 0.2s ease;
    }

    .work-btn:hover {
        background: #2563eb;
        border-color: #2563eb;
    }

    .footer-note {
        text-align: center;
        margin-top: 4rem;
        color: #94a3b8;
        font-size: 0.85rem;
        font-weight: 500;
    }

    /* BANNERS */
    .banner {
        padding: 1rem 1.5rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        font-weight: 600;
    }
    .error-banner { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .success-banner { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
  </style>
</head>
<body>

<div class="wrapper">

  <a th:href="@{/}" class="back-link">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M19 12H5M11 6l-6 6 6 6"/>
    </svg>
    Return Home
  </a>

  <!-- Notification Banners -->
  <div th:if="${error}" class="banner error-banner">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    <span th:text="${error}"></span>
  </div>

  <div th:if="${successMessage}" class="banner success-banner">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    <span th:text="${successMessage}"></span>
  </div>

  <div class="page-header">
    <p class="page-eyebrow" th:text="${projectName}">Order Inventory Management</p>
    <h1 class="page-title">Meet the Team</h1>
    <div class="title-bar"></div>
  </div>

  <div class="member-card" th:each="member : ${members}">
    <div class="avatar-wrap">
      <div class="avatar">
        <img th:src="@{${member.photoUrl}}"
             th:alt="${member.name}"
             style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;"/>
      </div>
    </div>

    <div class="member-info">
      <div class="member-name" th:text="${member.name}">Member Name</div>
      <div class="member-role" th:text="${member.role}">Team Member</div>
    </div>

    <a class="work-btn" th:href="@{/work/{slug}(slug=${member.workPage})}">
      Work
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </a>
  </div>

  <p class="footer-note" th:text="${projectName} + ' · 2026'">Footer</p>

</div>
</body>
</html>
