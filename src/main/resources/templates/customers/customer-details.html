<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .details-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .details-card {
            background: #ffffff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .details-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .avatar-circle {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: bold; color: white;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .details-title {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .badge-email {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .details-grid {
            margin-bottom: 2rem;
            display: flex; flex-direction: column; gap: 1rem;
        }

        .detail-item {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            gap: 1.5rem;
        }

        .detail-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }

        .btn-flex {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #475569;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #94a3b8;
        }

        .btn-edit {
            background: #fffbeb;
            color: #ca8a04;
            border: 1px solid #fde68a;
        }

        .btn-edit:hover {
            background: #fef3c7;
            color: #b45309;
        }
    </style>
</head>
<body>
<div class="details-wrapper">
    <div class="details-card">
        <div class="details-header">
            <div style="position: absolute; top: 0; left: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #94a3b8;">
                REF: #<span th:text="${customer.customerId}">1</span>
            </div>
            
            <div class="avatar-circle" th:text="${customer.fullName != null && customer.fullName.length() > 0 ? customer.fullName.substring(0,1).toUpperCase() : 'C'}">C</div>
            <h1 class="details-title" th:text="${customer.fullName}">Customer Name</h1>
            <span class="badge-email" th:text="${customer.emailAddress}">email@domain.com</span>
        </div>

        <div class="details-grid">
            <div class="detail-item">
                <span class="detail-label">ID</span>
                <span class="detail-value" style="font-family: 'JetBrains Mono', monospace; color: #a78bfa;" th:text="${customer.customerId}">123</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">EMAIL</span>
                <span class="detail-value" th:text="${customer.emailAddress}">valid@mail.com</span>
            </div>
        </div>

        <div class="btn-flex">
            <a th:href="@{/team}" class="btn btn-outline" style="font-size: 0.85rem; padding: 0.8rem 1rem;">&larr; Team</a>
            <a th:href="@{/frontend/customers}" class="btn btn-outline">&larr; Directory</a>
            <a th:href="@{/frontend/customers/{id}/edit(id=${customer.customerId})}" class="btn btn-edit">Modify Record</a>
        </div>
        
    </div>
</div>
</body>
</html>
