<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEdit} ? 'Edit Profile' : 'New Identity'">Customer Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .form-card {
            background: #ffffff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .form-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .form-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0 0 0.5rem 0;
        }

        .form-subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin: 0;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            color: #000;
            padding: 0.9rem 1.1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: #ffffff;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            flex: 1;
            border: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        .btn-cancel {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #475569;
        }

        .btn-cancel:hover {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #94a3b8;
        }
        
        .error-banner {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="form-wrapper">
    <div class="form-card">
        
        <div class="form-header">
            <h1 class="form-title" th:text="${isEdit} ? 'Update Identity' : 'Register Identity'">Form</h1>
            <p class="form-subtitle" th:text="${isEdit} ? 'Modify personal profile parameters natively' : 'Establish a new customer securely'">Description</p>
        </div>

        <div th:if="${error}" class="error-banner">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{${isEdit} ? '/frontend/customers/' + ${customer.customerId} + '/edit' : '/frontend/customers'}" 
              th:object="${customer}" method="post">
            
            <div class="input-grid">
                
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input class="form-input" type="text" th:field="*{fullName}" required placeholder="Sarah Jenkins" />
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input class="form-input" type="email" th:field="*{emailAddress}" required placeholder="user@domain.com" />
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/team}" class="btn btn-cancel" style="flex: 0.5; font-size: 0.85rem;">&larr; Team</a>
                <a th:href="@{/frontend/customers}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-submit" th:text="${isEdit} ? 'Confirm Changes' : 'Register Customer'">Submit</button>
            </div>
        </form>
        
    </div>
</div>
</body>
</html>
