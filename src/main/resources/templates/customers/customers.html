<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Database</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== CONTAINER ===== */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* ===== HEADER ===== */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: #ffffff;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        /* ===== FILTER ===== */
        .filter-form {
            background: #ffffff;
            border: 1px solid #dbeafe;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .filter-input {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #000;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .filter-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* ===== TABLE ===== */
        .glass-table-wrapper {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .styled-table thead tr {
            background: #3b82f6;
            color: #ffffff;
        }

        .styled-table th,
        .styled-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .styled-table tbody tr {
            transition: all 0.2s ease;
        }

        .styled-table tbody tr:hover {
            background: #f8fafc;
        }

        /* ===== BADGES ===== */
        .val-badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-email {
            background: #dbeafe;
            color: #1e40af;
        }

        /* ===== BUTTONS ===== */
        .action-flex {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .action-flex form {
            margin: 0;
            display: inline-flex;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.65rem 1.3rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #475569;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: #1e293b;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
        }

        .btn-delete {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .btn-delete:hover {
            background: #fecaca;
            color: #991b1b;
        }

        /* BANNERS */
        .error-banner, .success-banner {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
        }

        .error-banner {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .success-banner {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    
    <div class="dashboard-header">
        <div>
            <h1 class="header-title">Customer Identities</h1>
            <p style="color: #64748b; margin: 0.5rem 0 0 0; font-size: 0.95rem;">
                Securely manage Customer Profiles
            </p>
        </div>
        <div style="display: flex; gap: 0.75rem; align-items: center;">
            <a th:href="@{/frontend/customers/new}" class="btn btn-primary">+ New Customer</a>
            <a th:href="@{/team}" class="btn btn-outline">Team</a>
            <a th:href="@{/logout}" class="btn btn-outline" style="color: #ef4444; border-color: #fecaca;">Logout</a>
        </div>
    </div>
    
    <!-- Central Validation / Search logic mapping tool -->
    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <!-- Email Lookup -->
        <form class="filter-form" th:action="@{/frontend/customers/search}" method="get" style="flex: 1;">
            <b style="font-size: 0.85rem; color: #3b82f6; text-transform: uppercase;">By Email: </b>
            <input type="email" name="email" placeholder="user@domain.com" class="filter-input" required style="flex:1;" />
            <button type="submit" class="btn btn-outline" style="border-color: #3b82f6; color: #2563eb;">Find</button>
        </form>

        <!-- ID Lookup Layer -->
        <form class="filter-form" th:action="@{/frontend/customers/search}" method="get" style="background: #f0fdf4; border-color: #bbf7d0;">
            <b style="font-size: 0.85rem; color: #16a34a; text-transform: uppercase;">By ID: </b>
            <input type="number" name="id" placeholder="Ex: 5" class="filter-input" required style="width: 100px; border-color: #bbf7d0;" />
            <button type="submit" class="btn btn-outline" style="border-color: #16a34a; color: #15803d;">Find Profile</button>
        </form>

        <!-- Validate ID Layer -->
        <form class="filter-form" th:action="@{/frontend/customers/validate}" method="get" style="background: #fffbeb; border-color: #fde68a;">
            <b style="font-size: 0.85rem; color: #d97706; text-transform: uppercase;">Validate Check: </b>
            <input type="number" name="id" placeholder="ID" class="filter-input" required style="width: 80px; border-color: #fde68a;" />
            <button type="submit" class="btn btn-outline" style="border-color: #d97706; color: #b45309;">Verify Exist</button>
        </form>
    </div>

    <!-- Alert Banners -->
    <div th:if="${error}" class="error-banner">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span th:text="${error}"></span>
    </div>

    <div th:if="${successMessage}" class="success-banner">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span th:text="${successMessage}"></span>
    </div>

    <div class="glass-table-wrapper" style="margin-top: 1rem;">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Ref ID</th>
                    <th>Full Name</th>
                    <th>Email Address</th>
                    <th>Administrative Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="customer : ${customers}">
                    <td style="font-family: 'JetBrains Mono', monospace; color: #64748b;" th:text="${customer.customerId}">1</td>
                    <td style="font-weight: bold; color: #1e293b;" th:text="${customer.fullName}">John Doe</td>
                    <td><span class="val-badge badge-email" th:text="${customer.emailAddress}">email@domain.com</span></td>
                    <td class="action-flex">
                        <a th:href="@{/frontend/customers/{id}(id=${customer.customerId})}" class="btn btn-outline btn-sm">Profile</a>
                        <a th:href="@{/frontend/customers/{id}/edit(id=${customer.customerId})}" class="btn btn-outline btn-sm" style="color: #ca8a04; border-color: #fde68a;">Modify</a>
                        <form th:action="@{/frontend/customers/{id}/delete(id=${customer.customerId})}" method="post" onsubmit="return confirm('Wipe customer from Database irreversibly?');">
                            <button type="submit" class="btn btn-delete btn-sm">Erase</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="4" style="text-align: center; color: #94a3b8; padding: 3rem;">
                        No customers returned from backend. Try creating one!
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
