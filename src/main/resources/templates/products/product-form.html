<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title th:text="${isEdit} ? 'Edit Product' : 'Create Product'">Product Form</title>

<style>

/* ===== BACKGROUND (match product theme) ===== */
body {
    background: linear-gradient(135deg, #dbeafe, #edf4ff);
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== WRAPPER ===== */
.form-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem 1rem;
}

/* ===== CARD (lighter, cleaner) ===== */
.form-card {
    background: #ffffff;
    border: 1px solid #dbeafe;
    border-radius: 12px;
    padding: 2.8rem;
    width: 100%;
    max-width: 650px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
}

/* ===== TITLE (KEEP SAME STYLE) ===== */
.form-title {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
    text-align: center;
}

.form-subtitle {
    text-align: center;
    color: #64748b;
    margin-bottom: 2.5rem;
    font-size: 0.95rem;
}

/* ===== GRID ===== */
.input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
}

.full-width {
    grid-column: 1 / -1;
}

/* ===== FORM ===== */
.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.form-label {
    font-size: 0.75rem;
    color: #2563eb;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

/* INPUT */
.form-input {
    width: 100%;
    background: #ffffff;
    border: 1px solid #cbd5f5;
    border-radius: 8px;
    padding: 0.9rem 1rem;
    color: #0f172a;
    transition: all 0.2s ease;
    box-sizing: border-box;
}

.form-input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
}

/* ===== ACTIONS ===== */
.form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2.5rem;
}

/* ===== BUTTON BASE ===== */
.btn {
    flex: 1;
    height: 42px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
}

/* TEAM */
.btn-team {
    border: 1px solid #cbd5e1;
    color: #334155;
    background: #fff;
    font-size: 0.85rem;
}

/* CANCEL */
.btn-cancel {
    border: 1px solid #cbd5e1;
    color: #334155;
    background: #fff;
}

/* SUBMIT */
.btn-submit {
    background: linear-gradient(135deg, #10b981, #059669);
    color: #fff;
    border: none;
    box-shadow: 0 6px 15px rgba(16, 185, 129, 0.25);
}

.btn-submit:hover {
    background: linear-gradient(135deg, #059669, #047857);
}

/* ===== ERROR ===== */
.error-banner {
    background: #fee2e2;
    color: #991b1b;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #fca5a5;
    text-align: center;
}

</style>
</head>

<body>

<div class="form-wrapper">
<div class="form-card">

<h1 class="form-title" 
    th:text="${isEdit} ? 'Edit Catalog Entry' : 'New Catalog Entry'"></h1>

<p class="form-subtitle"
   th:text="${isEdit} ? 'Modifying existing data' : 'Integrate a new product into the database'"></p>

<div th:if="${error}" class="error-banner">
    <span th:text="${error}"></span>
</div>

<form th:action="${isEdit} ? @{/frontend/products/{id}/edit(id=${product.productId})} : @{/frontend/products}" 
      th:object="${product}" method="post">

<div class="input-grid">

<div class="form-group full-width">
    <label class="form-label">Product Name</label>
    <input class="form-input" type="text" th:field="*{productName}" required placeholder="Casual Denim Jacket"/>
</div>

<div class="form-group">
    <label class="form-label">Brand</label>
    <input class="form-input" type="text" th:field="*{brand}" required placeholder="Brand Name"/>
</div>

<div class="form-group">
    <label class="form-label">Colour</label>
    <input class="form-input" type="text" th:field="*{colour}" required placeholder="Enter colour (e.g. Red, Blue, Navy)"/>
</div>

<div class="form-group">
    <label class="form-label">Size</label>
    <input class="form-input" type="text" th:field="*{size}" required placeholder="S, M, L, XL"/>
</div>

<div class="form-group">
    <label class="form-label">Unit Price ($)</label>
    <input class="form-input" type="number" step="0.01" th:field="*{unitPrice}" required placeholder="0.00"/>
</div>

<div class="form-group">
    <label class="form-label">Rating</label>
    <input class="form-input" type="number" step="0.1" min="0" max="5" th:field="*{rating}" required placeholder="5.0"/>
</div>

</div>

<div class="form-actions">

<a th:href="@{/team}" class="btn btn-team">&larr; Team</a>

<a th:href="@{/frontend/products}" class="btn btn-cancel">Cancel</a>

<button type="submit" class="btn btn-submit"
        th:text="${isEdit} ? 'Update Product' : 'Publish Product'">
</button>

</div>

</form>

</div>
</div>

</body>
</html>
