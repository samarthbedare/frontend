<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product Details</title>

<style>

/* ===== BACKGROUND ===== */
body {
    background: linear-gradient(135deg, #dbeafe, #edf4ff);
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== WRAPPER ===== */
.details-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
}

/* ===== CARD ===== */
.details-card {
    background: #ffffff;
    border: 1px solid #dbeafe;
    border-radius: 14px;
    padding: 2.8rem;
    width: 100%;
    max-width: 650px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

/* ===== HEADER (LIKE DARK UI STRUCTURE) ===== */
.details-header {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
    padding: 1.5rem;
    border: 1px solid #e0ecff;
    border-radius: 12px;
    background: #f8fbff;
}

.details-title {
    font-size: 2.2rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 8px;
}

.badge-brand {
    display: inline-block;
    padding: 0.4rem 1rem;
    background: #e0ecff;
    color: #2563eb;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 6px;
}

/* ===== GRID ===== */
.details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
}

/* ===== ITEM ===== */
.detail-item {
    background: #f8fbff;              /* light blue background */
    border: 1px solid #bfdbfe;        /* soft blue border */
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    transition: 0.2s;
}

.detail-item:hover {
    border-color: #93c5fd;
    box-shadow: 0 3px 8px rgba(59,130,246,0.08);
}

.detail-label {
    font-size: 0.7rem;
    color: #64748b;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
}

.detail-value {
    margin-top: 4px;
}

/* ===== PRICE ===== */
.value-price {
    color: #dc2626;
}

/* ===== COLOR DOT ===== */
.color-dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    display: inline-block;
}

.color-red { background: #ef4444; }
.color-green { background: #10b981; }
.color-blue { background: #3b82f6; }
.color-black { background: #000; }
.color-yellow { background: #facc15; }
.color-white { background: #e5e7eb; }

/* ===== META (LIKE SECTION CARD) ===== */
.meta-box {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 1.1rem 1.5rem;
    margin-bottom: 2rem;
    font-size: 0.9rem;
    color: #64748b;
    background: #f8fbff;
}

/* ===== BUTTONS ===== */
.btn-flex {
    display: flex;
    justify-content: center;
    gap: 14px;
}

/* SAME SIZE BUTTONS */
.btn {
    height: 40px;
    min-width: 115px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    font-size: 0.9rem;
}

/* neutral */
.btn-outline {
    border: 1px solid #cbd5e1;
    color: #334155;
    background: #fff;
}

/* blue */
.btn-blue {
    border: 1px solid #3b82f6;
    color: #2563eb;
    background: #fff;
}

/* edit */
.btn-edit {
    border: 1px solid #facc15;
    color: #f59e0b;
    background: #fff;
}

/* delete */
.btn-delete {
    border: 1px solid #ef4444;
    color: #ef4444;
    background: #fff;
}

</style>
</head>

<body>

<div class="details-wrapper">
<div class="details-card">

<!-- HEADER -->
<div class="details-header">
    <div style="position:absolute; top:10px; left:15px; font-size:0.8rem; color:#64748b;">
        ID: <span th:text="${product.productId}"></span>
    </div>

    <h1 class="details-title" th:text="${product.productName}"></h1>
    <span class="badge-brand" th:text="${product.brand}"></span>
</div>

<!-- GRID -->
<div class="details-grid">

<div class="detail-item">
    <span class="detail-label">Colour</span>
    <div class="detail-value" style="display:flex; gap:8px; align-items:center;">
        <span class="color-dot"
              th:classappend="' color-' + ${#strings.toLowerCase(product.colour)}"></span>
        <span th:text="${product.colour}"></span>
    </div>
</div>

<div class="detail-item">
    <span class="detail-label">Size</span>
    <div class="detail-value">
        <span th:text="${product.size}"></span>
    </div>
</div>

<div class="detail-item">
    <span class="detail-label">Unit Price</span>
    <div class="detail-value value-price">
        <span th:text="'$' + ${product.unitPrice}"></span>
    </div>
</div>

<div class="detail-item">
    <span class="detail-label">Rating</span>
    <div class="detail-value">
        <span style="color:#f59e0b;">★</span>
        <span th:text="${product.rating}"></span>
    </div>
</div>

</div>

<!-- META -->
<div class="meta-box">
    /api/v1/products/<span th:text="${product.productId}"></span>
</div>

<!-- BUTTONS -->
<div class="btn-flex">

<a th:href="@{/team}" class="btn btn-outline">Team</a>

<a th:href="@{/frontend/products}" class="btn btn-blue">Catalog</a>

<a th:href="@{/frontend/products/{id}/edit(id=${product.productId})}" 
   class="btn btn-edit">Edit</a>

<form th:action="@{/frontend/products/{id}/delete(id=${product.productId})}" method="post">
<button class="btn btn-delete"
onclick="return confirm('Delete this product?')">
Delete
</button>
</form>

</div>

</div>
</div>

</body>
</html>
