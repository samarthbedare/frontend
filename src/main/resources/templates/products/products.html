<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Products Dashboard</title>

<style>

/* ===== GLOBAL ===== */
body {
    background: linear-gradient(135deg, #dbeafe, #eaf3ff);
    min-height: 100vh;
    color: #000;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== CONTAINER ===== */
.dashboard-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
}

/* ===== HEADER ===== */
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2.5rem;
    background: #ffffff;
    padding: 1.5rem 2rem;
    border: 1px solid #dbeafe;
}

/* ===== TITLE ===== */
.header-title {
    font-size: 2rem;
    font-weight: 800;
}

/* ===== FILTER ===== */
.filter-form {
    background: #ffffff;
    border: 1px solid #dbeafe;
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: center;
}

/* ===== INPUT ===== */
.filter-input {
    background: #ffffff;
    border: 1px solid #cbd5e1;
    color: #000;
    padding: 0.6rem 1rem;
}

/* ===== TABLE ===== */
.glass-table-wrapper {
    background: #ffffff;
    border: 1px solid #dbeafe;
}

.styled-table {
    width: 100%;
    border-collapse: collapse;
}

.styled-table thead tr {
    background: #3b82f6;
    color: #ffffff;
}

.styled-table th,
.styled-table td {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid #e2e8f0;
}

.styled-table tbody tr:hover {
    background: #f8fafc;
}

/* ===== BADGES ===== */
.val-badge {
    padding: 0.25rem 0.6rem;
    font-size: 0.75rem;
}

.badge-brand {
    background: #dbeafe;
    color: #1d4ed8;
}

.badge-size {
    background: #d1fae5;
    color: #065f46;
}

/* ===== PRICE ===== */
.price-val {
    font-weight: bold;
    color: #dc2626;
}

/* ===== BUTTONS ===== */
.btn {
    padding: 0.5rem 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    font-size: 0.85rem;
}

.btn-outline {
    border: 1px solid #cbd5e1;
    color: #334155;
    background: #ffffff;
}

.btn-primary {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
}

/* DELETE BUTTON */
.btn-delete {
    border: 1px solid #ef4444;
    color: #ef4444;
    background: #ffffff;
}

/* CLEAR BUTTON */
.btn-clear {
    border: 1px solid #cbd5e1;
    background: #ffffff;
    color: #64748b;
    border-radius: 8px;
    padding: 0.5rem 1rem;
}

/* COLOR DOT */
.color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
}

.color-red { background: #ef4444; }
.color-green { background: #10b981; }
.color-blue { background: #3b82f6; }
.color-black { background: #000; }
.color-yellow { background: #facc15; }
.color-white { background: #e5e7eb; }

/* ERROR */
.error-banner {
    background: #fee2e2;
    border: 1px solid #fca5a5;
    color: #991b1b;
    padding: 1rem;
    margin-bottom: 1rem;
    text-align: center;
}
.btn-view {
    border: 1px solid #3b82f6;
    color: #3b82f6;
    background: #ffffff;
}

.btn-view:hover {
    background: #eff6ff;
}

</style>
</head>

<body>

<div class="dashboard-container">

<!-- HEADER -->
<div class="dashboard-header">
    <div>
        <h1 class="header-title">Product Catalog</h1>
        <p style="color:#475569;">Manage your inventory</p>
    </div>

    <div style="display:flex; gap:1rem;">
        <a th:href="@{/frontend/products/new}" class="btn btn-primary">+ New Product</a>
        <a th:href="@{/team}" class="btn btn-outline">Team</a>
        <a th:href="@{/work/narayani}" class="btn btn-outline">Module</a>
        <a th:href="@{/logout}" class="btn btn-outline">Logout</a>
    </div>
</div>

<!-- FILTER -->
<form class="filter-form" th:action="@{/frontend/products}" method="get">
    <b>Filters:</b>
    <input name="name" th:value="${name}" placeholder="Name" class="filter-input"/>
    <input name="brand" th:value="${brand}" placeholder="Brand" class="filter-input"/>
    <input name="colour" th:value="${colour}" placeholder="Colour" class="filter-input"/>
    <input name="size" th:value="${size}" placeholder="Size" class="filter-input"/>
    <button class="btn btn-outline">Apply</button>
    <a th:href="@{/frontend/products}" class="btn-clear">Clear</a>
</form>

<!-- LOOKUP -->
<form class="filter-form" th:action="@{/frontend/products/search}" method="get">
    <b>Direct Lookup:</b>
    <input type="number" name="id" placeholder="Product ID" class="filter-input"/>
    <button class="btn btn-outline">Find</button>
</form>

<!-- SUCCESS -->
<div th:if="${successMessage}" 
     style="background:#dcfce7; color:#166534; padding:1rem; margin-bottom:1rem; border:1px solid #86efac; text-align:center; border-radius:6px;">
    
    <span th:text="${successMessage}"></span>
</div>

<!-- ERROR -->
<div th:if="${error}" class="error-banner">
    <span th:text="${error}"></span>
</div>

<!-- TABLE -->
<div class="glass-table-wrapper">
<table class="styled-table">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Brand</th>
<th>Colour</th>
<th>Size</th>
<th>Price</th>
<th>Rating</th>
<th>Actions</th>
</tr>
</thead>

<tbody>
<tr th:each="product : ${products}">

<td th:text="${product.productId}"></td>

<td style="font-weight:bold;" th:text="${product.productName}"></td>

<td><span class="val-badge badge-brand" th:text="${product.brand}"></span></td>

<td>
<span style="display:flex; align-items:center; gap:6px;">
<span class="color-dot"
      th:classappend="' color-' + ${#strings.toLowerCase(product.colour)}"></span>
<span th:text="${product.colour}"></span>
</span>
</td>

<td><span class="val-badge badge-size" th:text="${product.size}"></span></td>

<td class="price-val" th:text="'$'+${product.unitPrice}"></td>

<td>
<span style="color:#f59e0b;">★</span>
<span th:text="${product.rating}"></span>
</td>

<td style="display:flex; gap:6px;">

<a th:href="@{/frontend/products/{id}(id=${product.productId})}" class="btn btn-view">View</a>

<a th:href="@{/frontend/products/{id}/edit(id=${product.productId})}" class="btn btn-outline">Edit</a>

<form th:action="@{/frontend/products/{id}/delete(id=${product.productId})}" method="post">
<button type="submit" class="btn btn-delete"
onclick="return confirm('Delete this product?')">Delete</button>
</form>

</td>

</tr>

<tr th:if="${#lists.isEmpty(products)}">
<td colspan="8" style="text-align:center;">No products found</td>
</tr>

</tbody>
</table>
</div>

</div>

</body>
</html>
