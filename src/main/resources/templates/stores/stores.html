<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Stores Database</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== CONTAINER ===== */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* ===== HEADER ===== */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: #ffffff;
            padding: 1.5rem 2rem;
            border: 1px solid #dbeafe;
        }

        /* ===== TITLE ===== */
        .header-title {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
        }

        /* ===== FILTER ===== */
        .filter-form {
            background: #ffffff;
            border: 1px solid #dbeafe;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== INPUT ===== */
        .filter-input {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #000;
            padding: 0.6rem 1rem;
            border-radius: 4px;
        }

        /* ===== TABLE ===== */
        .glass-table-wrapper {
            background: #ffffff;
            border: 1px solid #dbeafe;
            margin-top: 1rem;
            overflow: hidden;
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .styled-table thead tr {
            background: #3b82f6;
            color: #ffffff;
        }

        .styled-table th,
        .styled-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .styled-table tbody tr:hover {
            background: #f8fafc;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #334155;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .btn-sm {
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
        }

        .btn-delete {
            border: 1px solid #ef4444;
            color: #ef4444;
            background: #ffffff;
        }

        .btn-delete:hover {
            background: #fef2f2;
        }

        /* BANNER */
        .error-banner {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .success-banner {
            background: #dcfce7;
            border: 1px solid #86efac;
            color: #166534;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #ffffff;
            margin: 10% auto;
            padding: 2.5rem;
            border: 1px solid #dbeafe;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .close {
            color: #64748b;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: #000;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #334155;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            color: #000;
            font-family: inherit;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
        <div>
            <h1 class="header-title">Store Management</h1>
            <p style="color: #475569; margin: 0.5rem 0 0 0; font-size: 0.9rem;">Manage store locations and inventory mapping.</p>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button onclick="document.getElementById('newStoreModal').style.display='block'" class="btn btn-primary">+ New Store</button>
            <a th:href="@{/team}" class="btn btn-outline">&larr; Team</a>
            <a th:href="@{/frontend/products}" class="btn btn-outline">Products</a>
        </div>
    </div>
    
    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <form class="filter-form" th:action="@{/frontend/stores/search}" method="get" style="flex: 1;">
            <b style="font-size: 0.85rem; color: #3b82f6; text-transform: uppercase;">By Address: </b>
            <input type="text" name="address" placeholder="Physical Address" class="filter-input" style="flex:1;" required/>
            <button type="submit" class="btn btn-outline">Find</button>
        </form>
        <form class="filter-form" onsubmit="event.preventDefault(); window.location.href='/frontend/stores/' + document.getElementById('searchStoreId').value;" style="flex: 1;">
            <b style="font-size: 0.85rem; color: #10b981; text-transform: uppercase;">By ID: </b>
            <input type="number" id="searchStoreId" placeholder="Store ID" class="filter-input" style="flex:1;" required min="1"/>
            <button type="submit" class="btn btn-outline">Fetch Store</button>
        </form>
    </div>

    <div th:if="${error}" class="error-banner" th:text="${error}"></div>
    <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>

    <div class="glass-table-wrapper" style="margin-top: 1rem;">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Store ID</th>
                    <th>Name</th>
                    <th>Web Address</th>
                    <th>Physical Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="store : ${stores}">
                    <td th:text="${store.storeId}">1</td>
                    <td style="font-weight: 600;" th:text="${store.storeName}">Name</td>
                    <td><a th:href="${store.webAddress}" th:text="${store.webAddress}" style="color: #2563eb; text-decoration: none;" target="_blank">URL</a></td>
                    <td th:text="${store.physicalAddress}">Address</td>
                    <td style="display:flex; gap: 0.5rem;">
                        <a th:href="@{/frontend/stores/{id}(id=${store.storeId})}" class="btn btn-outline btn-sm">View</a>
                        <form th:action="@{/frontend/stores/{id}/delete(id=${store.storeId})}" method="post" onsubmit="return confirm('Delete this store permanently?');" style="margin:0;">
                            <button type="submit" class="btn btn-delete btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(stores)}">
                    <td colspan="5" style="text-align: center; color: #64748b; padding: 2rem;">No stores matched the requested criteria.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- New Store Modal -->
<div id="newStoreModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="document.getElementById('newStoreModal').style.display='none'">&times;</span>
        <h2 style="color: #000; margin-top:0; font-weight: 800;">Create Store</h2>
        <form th:action="@{/frontend/stores}" method="post">
            <div class="form-group">
                <label class="form-label">Store Name</label>
                <input type="text" name="storeName" class="form-control" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Web Address</label>
                <input type="url" name="webAddress" class="form-control"/>
            </div>
            <div class="form-group">
                <label class="form-label">Physical Address</label>
                <input type="text" name="physicalAddress" class="form-control" required/>
            </div>
            <div class="form-group" style="display:flex; gap:1rem;">
                <div style="flex:1;">
                    <label class="form-label">Latitude</label>
                    <input type="number" step="any" name="latitude" class="form-control"/>
                </div>
                <div style="flex:1;">
                    <label class="form-label">Longitude</label>
                    <input type="number" step="any" name="longitude" class="form-control"/>
                </div>
            </div>
            <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
                <button type="button" class="btn btn-outline" style="margin-right:1rem;" onclick="document.getElementById('newStoreModal').style.display='none'">Cancel</button>
                <button type="submit" class="btn btn-primary">Create Store</button>
            </div>
        </form>
    </div>
</div>

<script>
    window.onclick = function(event) {
        if (event.target == document.getElementById('newStoreModal')) {
            document.getElementById('newStoreModal').style.display = "none";
        }
    }
</script>
</body>
</html>
