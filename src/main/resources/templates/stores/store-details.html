<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Store Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== CONTAINER ===== */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* ===== HEADER ===== */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: #ffffff;
            padding: 1.5rem 2rem;
            border: 1px solid #dbeafe;
        }

        /* ===== TITLE ===== */
        .header-title {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .glass-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            color: #1e293b;
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 0;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .info-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .info-value {
            font-size: 1.1rem;
            color: #0f172a;
            font-weight: 500;
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .styled-table thead tr {
            background: #3b82f6;
            color: #ffffff;
        }

        .styled-table th,
        .styled-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .styled-table tbody tr:hover {
            background: #f8fafc;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #334155;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .btn-sm {
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
        }

        .btn-delete {
            border: 1px solid #ef4444;
            color: #ef4444;
            background: #ffffff;
        }

        .btn-delete:hover {
            background: #fef2f2;
        }

        .btn-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #86efac;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            color: #000;
            font-family: inherit;
            margin-bottom: 0.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #334155;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .val-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* BANNERS */
        .error-banner {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .success-banner {
            background: #dcfce7;
            border: 1px solid #86efac;
            color: #166534;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
        <div>
            <h1 class="header-title" th:text="${store.storeName}">Store Name</h1>
            <p style="color: #475569; margin: 0.5rem 0 0 0; font-size: 0.9rem;" th:text="${'Store ID: ' + store.storeId}">Store ID</p>
        </div>
        <div style="display: flex; gap: 1rem;">
            <form th:action="@{/frontend/stores/{id}/delete(id=${store.storeId})}" method="post" onsubmit="return confirm('Delete this store permanently?');" style="margin: 0;">
                <button type="submit" class="btn btn-delete">Delete Store</button>
            </form>
            <a th:href="@{/frontend/stores}" class="btn btn-outline">&larr; Back to Stores</a>
        </div>
    </div>

    <div th:if="${error}" class="error-banner" th:text="${error}"></div>
    <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>

    <div class="card-grid">
        <!-- Store Information Card -->
        <div class="glass-card">
            <h2 class="card-title">Store Profile</h2>
            <div class="info-grid" style="grid-template-columns: 1fr;">
                <div>
                    <div class="info-label">Web Address</div>
                    <div class="info-value"><a th:href="${store.webAddress}" th:text="${store.webAddress != null ? store.webAddress : 'N/A'}" style="color:#2563eb" target="_blank">URL</a></div>
                </div>
                <div>
                    <div class="info-label">Physical Address</div>
                    <div class="info-value" th:text="${store.physicalAddress}">Address</div>
                </div>
                <div style="display:flex; gap:2rem;">
                    <div>
                        <div class="info-label">Latitude</div>
                        <div class="info-value" th:text="${store.latitude != null ? store.latitude : 'N/A'}">Lat</div>
                    </div>
                    <div>
                        <div class="info-label">Longitude</div>
                        <div class="info-value" th:text="${store.longitude != null ? store.longitude : 'N/A'}">Lng</div>
                    </div>
                </div>
            </div>

            <!-- Update Store Form -->
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 2rem 0;">
            <h3 style="color: #334155; font-size: 1rem; margin-bottom: 1rem; font-weight: 700;">Update Details</h3>
            <form th:action="@{/frontend/stores/{id}/update(id=${store.storeId})}" method="post">
                <input type="hidden" name="storeId" th:value="${store.storeId}"/>
                <div class="form-group" style="margin-bottom:1rem;">
                    <label class="form-label">Store Name</label>
                    <input type="text" name="storeName" th:value="${store.storeName}" class="form-control" required/>
                </div>
                <div class="form-group" style="margin-bottom:1rem;">
                    <label class="form-label">Web Address</label>
                    <input type="url" name="webAddress" th:value="${store.webAddress}" class="form-control"/>
                </div>
                <div class="form-group" style="margin-bottom:1rem;">
                    <label class="form-label">Physical Address</label>
                    <input type="text" name="physicalAddress" th:value="${store.physicalAddress}" class="form-control" required/>
                </div>
                <div style="display:flex; gap:1rem; margin-bottom: 1rem;">
                    <div style="flex:1;">
                        <label class="form-label">Latitude</label>
                        <input type="number" step="any" name="latitude" th:value="${store.latitude}" class="form-control"/>
                    </div>
                    <div style="flex:1;">
                        <label class="form-label">Longitude</label>
                        <input type="number" step="any" name="longitude" th:value="${store.longitude}" class="form-control"/>
                    </div>
                </div>
                <button type="submit" class="btn btn-outline" style="width: 100%">Save Changes</button>
            </form>
        </div>

        <!-- Inventory List Card -->
        <div class="glass-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
            <div style="padding: 2rem 2rem 0 2rem;">
                <div class="flex-between">
                    <h2 class="card-title" style="border:none; margin:0; padding:0;">Inventory Stock</h2>
                </div>
            </div>
            
            <div style="flex-grow: 1; overflow-y: auto; max-height: 400px;">
                <table class="styled-table">
                    <thead style="position: sticky; top: 0; z-index: 10;">
                        <tr>
                            <th>Inventory ID</th>
                            <th>Product ID</th>
                            <th>Stock Level</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody th:if="${#lists.isEmpty(inventoryList)}">
                        <tr><td colspan="4" style="text-align:center; padding:2rem; color:#64748b;">No inventory tracked at this store.</td></tr>
                    </tbody>
                    <tbody th:unless="${#lists.isEmpty(inventoryList)}">
                        <tr th:each="inv : ${inventoryList}">
                            <td th:text="${inv.inventoryId}">1</td>
                            <td th:text="${inv.productId}">1</td>
                            <td><span class="val-badge" style="background: #d1fae5; color: #065f46;" th:text="${inv.productInventory}">10</span></td>
                            <td>
                                <!-- Inline Action buttons for + / - Stock -->
                                <div style="display: flex; gap: 0.5rem; align-items:center;">
                                    <form th:action="@{/frontend/stores/{id}/inventory/updateStock(id=${store.storeId})}" method="post" style="display:flex; gap:0.2rem;">
                                        <input type="hidden" name="productId" th:value="${inv.productId}"/>
                                        <input type="hidden" name="action" value="reduce"/>
                                        <input type="number" name="quantity" value="1" min="1" max="1000" style="width:50px; background: #ffffff; border:1px solid #cbd5e1; color:#000; border-radius:4px; text-align:center;"/>
                                        <button type="submit" class="btn btn-outline btn-sm">-</button>
                                    </form>
                                    <form th:action="@{/frontend/stores/{id}/inventory/updateStock(id=${store.storeId})}" method="post" style="display:flex; gap:0.2rem;">
                                        <input type="hidden" name="productId" th:value="${inv.productId}"/>
                                        <input type="hidden" name="action" value="add"/>
                                        <input type="number" name="quantity" value="1" min="1" max="1000" style="width:50px; background: #ffffff; border:1px solid #cbd5e1; color:#000; border-radius:4px; text-align:center;"/>
                                        <button type="submit" class="btn btn-success btn-sm">+</button>
                                    </form>
                                    
                                    <!-- Delete Item Entirely -->
                                    <form th:action="@{/frontend/stores/{id}/inventory/delete(id=${store.storeId})}" method="post" style="margin-left: 0.5rem;" onsubmit="return confirm('Remove product from store inventory?');">
                                        <input type="hidden" name="productId" th:value="${inv.productId}"/>
                                        <button type="submit" class="btn btn-delete btn-sm" title="Remove from inventory">X</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Add new inventory to store form -->
            <div style="padding: 1.5rem 2rem; background: #f8fafc; border-top: 1px solid #e2e8f0;">
                <form th:action="@{/frontend/stores/{id}/inventory(id=${store.storeId})}" method="post" style="display:flex; gap:1rem; align-items: flex-end;">
                    <div style="flex:1;">
                        <label class="form-label" style="font-size:0.8rem;">Product ID</label>
                        <input type="number" name="productId" class="form-control" style="margin:0; padding:0.6rem;" required/>
                    </div>
                    <div style="flex:1;">
                        <label class="form-label" style="font-size:0.8rem;">Initial Stock</label>
                        <input type="number" name="productInventory" class="form-control" style="margin:0; padding:0.6rem;" min="0" required/>
                    </div>
                    <button type="submit" class="btn btn-primary" style="padding:0.6rem 1.2rem;">Add Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
