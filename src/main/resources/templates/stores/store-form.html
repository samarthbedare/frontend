<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEdit ? 'Edit Store' : 'Create New Store'}">Store Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .form-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.6s ease forwards;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-title {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c4b5fd, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .form-subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.4);
            filter: brightness(1.1);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #fff;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .row {
            display: flex;
            gap: 1rem;
        }
        .col {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="glow-orb" style="background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 60%);"></div>
    
    <div class="form-container">
        <div class="form-header">
            <h1 class="form-title" th:text="${isEdit ? 'Update Store' : 'Onboard New Store'}">Store Form</h1>
            <p class="form-subtitle" th:text="${isEdit ? 'Modify location and contact details for this node.' : 'Establish a new physical or digital node in the network.'}">Form description</p>
        </div>

        <form th:action="${isEdit} ? @{/frontend/stores/{id}/update(id=${store.storeId})} : @{/frontend/stores}" 
              th:object="${store}" 
              method="post">
            
            <input type="hidden" th:if="${isEdit}" th:field="*{storeId}"/>

            <div class="form-group">
                <label class="form-label">Store Name</label>
                <input type="text" th:field="*{storeName}" class="form-control" placeholder="e.g. Downtown Central Hub" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Web Address (Optional)</label>
                <input type="url" th:field="*{webAddress}" class="form-control" placeholder="https://stores.example.com/hub1"/>
            </div>

            <div class="form-group">
                <label class="form-label">Physical Address</label>
                <input type="text" th:field="*{physicalAddress}" class="form-control" placeholder="Street, City, Zip Code" required/>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label class="form-label">Latitude</label>
                    <input type="number" step="any" th:field="*{latitude}" class="form-control" placeholder="0.0000"/>
                </div>
                <div class="col form-group">
                    <label class="form-label">Longitude</label>
                    <input type="number" step="any" th:field="*{longitude}" class="form-control" placeholder="0.0000"/>
                </div>
            </div>

            <button type="submit" class="btn-submit" th:text="${isEdit ? 'Synchronize Updates' : 'Initialize Store Node'}">Submit</button>
        </form>

        <a th:href="@{/frontend/stores}" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M19 12H5M11 6l-6 6 6 6"/>
            </svg>
            Returns to Node Directory
        </a>
    </div>
</body>
</html>
