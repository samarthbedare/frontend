<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isEdit ? 'Edit Store' : 'Create New Store'}">Store Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 3rem;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .form-subtitle {
            color: #64748b;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #334155;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            color: #000;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #1e293b;
        }

        .row {
            display: flex;
            gap: 1rem;
        }
        .col {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1 class="form-title" th:text="${isEdit ? 'Update Store' : 'Onboard New Store'}">Store Form</h1>
            <p class="form-subtitle" th:text="${isEdit ? 'Modify location and contact details for this node.' : 'Establish a new physical or digital node in the network.'}">Form description</p>
        </div>


        <form th:action="${isEdit} ? @{/frontend/stores/{id}/update(id=${store.storeId})} : @{/frontend/stores}" 
              th:object="${store}" 
              method="post">
            
            <input type="hidden" th:if="${isEdit}" th:field="*{storeId}"/>

            <div class="form-group">
                <label class="form-label">Store Name</label>
                <input type="text" th:field="*{storeName}" class="form-control" placeholder="e.g. Downtown Central Hub" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Web Address (Optional)</label>
                <input type="url" th:field="*{webAddress}" class="form-control" placeholder="https://stores.example.com/hub1"/>
            </div>

            <div class="form-group">
                <label class="form-label">Physical Address</label>
                <input type="text" th:field="*{physicalAddress}" class="form-control" placeholder="Street, City, Zip Code" required/>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label class="form-label">Latitude</label>
                    <input type="number" step="any" th:field="*{latitude}" class="form-control" placeholder="0.0000"/>
                </div>
                <div class="col form-group">
                    <label class="form-label">Longitude</label>
                    <input type="number" step="any" th:field="*{longitude}" class="form-control" placeholder="0.0000"/>
                </div>
            </div>

            <button type="submit" class="btn-submit" th:text="${isEdit ? 'Synchronize Updates' : 'Initialize Store Node'}">Submit</button>
        </form>

        <a th:href="@{/frontend/stores}" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M19 12H5M11 6l-6 6 6 6"/>
            </svg>
            Returns to Node Directory
        </a>
    </div>
</body>
</html>
