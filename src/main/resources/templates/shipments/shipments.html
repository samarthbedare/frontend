<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shipment Logistics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== CONTAINER ===== */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* ===== HEADER ===== */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: #ffffff;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        /* ===== FILTER ===== */
        .filter-form {
            background: #ffffff;
            border: 1px solid #dbeafe;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .filter-input {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #000;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-family: inherit;
        }

        /* ===== TABLE ===== */
        .glass-table-wrapper {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .styled-table thead tr {
            background: #3b82f6;
            color: #ffffff;
        }

        .styled-table th,
        .styled-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .styled-table tbody tr:hover {
            background: #f8fafc;
        }

        /* ===== BADGES ===== */
        .val-badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-created { background: #f1f5f9; color: #475569; }
        .status-transit { background: #dbeafe; color: #1e40af; }
        .status-delivered { background: #dcfce7; color: #166534; }
        .status-unknown { background: #fef3c7; color: #92400e; }

        /* ===== BUTTONS ===== */
        .action-flex {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.65rem 1.3rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #475569;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: #1e293b;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
        }

        /* BANNERS */
        .error-banner, .success-banner {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
        }

        .error-banner { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        .success-banner { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
        <div>
            <h1 class="header-title">Logistics Tracking</h1>
            <p style="color: #64748b; margin: 0.5rem 0 0 0; font-size: 0.95rem;" th:text="${'Focusing Network Scope: ' + filterContext}">Viewing Network Scope</p>
        </div>
        <div style="display: flex; gap: 0.75rem; align-items: center;">
            <a th:href="@{/frontend/shipments/add}" class="btn btn-primary">+ Log Shipment</a>
            <a th:href="@{/team}" class="btn btn-outline">Team</a>
        </div>
    </div>

    <!-- Filter System -->
    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <form class="filter-form" th:action="@{/frontend/shipments}" method="get" style="flex: 1; border-color: #dbeafe;">
            <b style="font-size: 0.85rem; color: #3b82f6; text-transform: uppercase;">By Customer: </b>
            <input type="number" name="customerId" placeholder="Customer ID" class="filter-input" required min="1"/>
            <button type="submit" class="btn btn-outline" style="border-color: #3b82f6; color: #2563eb;">Query</button>
        </form>
        <form class="filter-form" th:action="@{/frontend/shipments}" method="get" style="flex: 1; border-color: #dbeafe;">
            <b style="font-size: 0.85rem; color: #3b82f6; text-transform: uppercase;">By Store: </b>
            <input type="number" name="storeId" placeholder="Store ID" class="filter-input" required min="1"/>
            <button type="submit" class="btn btn-outline" style="border-color: #3b82f6; color: #2563eb;">Query</button>
        </form>
        <form class="filter-form" onsubmit="event.preventDefault(); window.location.href='/frontend/shipments/' + document.getElementById('searchShipmentId').value;" style="flex: 1; background: #f0fdf4; border-color: #bbf7d0;">
            <b style="font-size: 0.85rem; color: #16a34a; text-transform: uppercase;">By ID: </b>
            <input type="number" id="searchShipmentId" placeholder="Tracking Number" class="filter-input" required min="1" style="border-color: #bbf7d0;"/>
            <button type="submit" class="btn btn-outline" style="border-color: #16a34a; color: #15803d;">Locate</button>
        </form>
        <div style="display:flex; align-items:center; margin-bottom:1rem;">
            <a th:href="@{/frontend/shipments}" class="btn btn-outline" style="font-size:0.8rem; padding:0.6rem;">Clear</a>
        </div>
    </div>

    <div th:if="${error}" class="error-banner" th:text="${error}"></div>
    <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>

    <div class="glass-table-wrapper" style="margin-top: 1rem;">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Tracking ID</th>
                    <th>Customer ID</th>
                    <th>Store Origin</th>
                    <th>Delivery Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="shipment : ${shipments}">
                    <td style="font-family: 'JetBrains Mono', monospace; color: #64748b;" th:text="${'#' + shipment.shipmentId}">#1</td>
                    <td th:text="${shipment.customerId}">Cust1</td>
                    <td th:text="${shipment.storeId}">Store1</td>
                    <td>
                        <span th:if="${shipment.shipmentStatus == 'CREATED'}" class="val-badge status-created">Created</span>
                        <span th:if="${shipment.shipmentStatus == 'IN-TRANSIT'}" class="val-badge status-transit">In Transit</span>
                        <span th:if="${shipment.shipmentStatus == 'DELIVERED'}" class="val-badge status-delivered">Delivered</span>
                        <span th:if="${shipment.shipmentStatus != 'CREATED' && shipment.shipmentStatus != 'IN-TRANSIT' && shipment.shipmentStatus != 'DELIVERED'}" class="val-badge status-unknown" th:text="${shipment.shipmentStatus}">Unknown</span>
                    </td>
                    <td class="action-flex">
                        <a th:href="@{/frontend/shipments/{id}(id=${shipment.shipmentId})}" class="btn btn-outline btn-sm">Manage</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(shipments)}">
                    <td colspan="5" style="text-align: center; color: #64748b; padding: 3rem;">No shipments found matching criteria.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
