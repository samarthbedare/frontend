<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register New Shipment</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        .form-card {
            background: #ffffff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .form-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .form-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .form-input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0.9rem 1.1rem;
            color: #000;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: #ffffff;
        }

        .form-input::placeholder { color: #94a3b8; }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.9rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 1rem;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn-cancel {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #475569;
            flex: 0.6;
        }

        .btn-cancel:hover {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #94a3b8;
        }

        .error-banner { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 500; }
        .success-banner { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>
<div class="form-wrapper">
    <div class="form-card">

        <h1 class="form-title">Log New Shipment</h1>
        <p class="form-subtitle">Register a new shipment into the logistics network</p>

        <!-- Feedback banners -->
        <div th:if="${error}" class="error-banner" th:text="${error}"></div>
        <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>

        <!-- Form POSTs to /frontend/shipments/add — stays on this page after submit -->
        <form th:action="@{/frontend/shipments/add}" th:object="${shipment}" method="post">

            <div class="form-group">
                <label class="form-label">Customer ID</label>
                <input class="form-input" type="number" th:field="*{customerId}"
                       required min="1" placeholder="e.g. 101"/>
            </div>

            <div class="form-group">
                <label class="form-label">Store ID</label>
                <input class="form-input" type="number" th:field="*{storeId}"
                       required min="1" placeholder="e.g. 5"/>
            </div>

            <div class="form-group">
                <label class="form-label">Delivery Address</label>
                <input class="form-input" type="text" th:field="*{deliveryAddress}"
                       required placeholder="e.g. 42 Koregaon Park, Pune 411001"/>
            </div>

            <div class="form-actions">
                <a th:href="@{/frontend/shipments}" class="btn btn-cancel">Back</a>
                <button type="submit" class="btn btn-submit">Process Registration</button>
            </div>

        </form>

    </div>
</div>
</body>
</html>
