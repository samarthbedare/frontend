<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Delete Shipment</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        .form-card {
            background: #ffffff;
            border: 1px solid #fee2e2;
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .form-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .form-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .warning-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 1.25rem;
            color: #991b1b;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            color: #b91c1c;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .form-input {
            width: 100%;
            background: #fff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0.9rem 1.1rem;
            color: #000;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 0.9rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 1rem;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: #fff;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.4);
        }

        .btn-cancel {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #475569;
            flex: 0.6;
        }

        .btn-cancel:hover {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #94a3b8;
        }

        .error-banner { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 500; }
        .success-banner { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; padding: 1rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>
<div class="form-wrapper">
    <div class="form-card">

        <h1 class="form-title">Delete Shipment</h1>
        <p class="form-subtitle">Permanently remove a shipment record from the system</p>

        <!-- Feedback banners -->
        <div th:if="${error}" class="error-banner" th:text="${error}"></div>
        <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>

        <div class="warning-box">
            ⚠️ <strong>This action is irreversible.</strong> Deleting a shipment will permanently remove it from the
            logistics database. If the shipment is linked to active orders, the operation will be blocked.
        </div>

        <div class="form-group">
            <label class="form-label">Shipment Tracking ID</label>
			<input class="form-input" type="number" id="shipmentIdInput"
			       th:value="${prefilledId}"
			       required min="1" placeholder="e.g. 7"/>
        </div>

        <div class="form-actions">
            <a th:href="@{/frontend/shipments}" class="btn btn-cancel">Back</a>
            <button type="button" class="btn btn-delete" onclick="submitDelete()">
                Confirm Deletion
            </button>
        </div>

    </div>
</div>

<form id="deleteForm" method="post" style="display:none;"></form>

<script>
    function submitDelete() {
        const id = document.getElementById('shipmentIdInput').value;
        if (!id || id < 1) {
            alert('Please enter a valid Shipment ID.');
            return;
        }
        if (!confirm('Permanently delete Shipment #' + id + '? This cannot be undone.')) return;

        const form = document.getElementById('deleteForm');
        form.action = '/frontend/shipments/' + id + '/delete';
        form.submit();
    }
</script>
</body>
</html>
