<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shipment Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: #ffffff;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .header-title {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .card-grid { grid-template-columns: 1fr; }
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            color: #1e293b;
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 0;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .info-value {
            font-size: 1.1rem;
            color: #1e293b;
            font-weight: 600;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.4rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #475569;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: #1e293b;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn-delete {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .btn-delete:hover {
            background: #fecaca;
            color: #991b1b;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            color: #000;
            font-family: inherit;
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #475569;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .val-badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .error-banner { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 1rem 1.5rem; border-radius: 10px; margin-bottom: 2rem; font-weight: 500; }
        .success-banner { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; padding: 1rem 1.5rem; border-radius: 10px; margin-bottom: 2rem; font-weight: 500; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
        <div>
            <h1 class="header-title" th:text="${'Shipment #' + shipment.shipmentId}">Tracking #ID</h1>
            <p style="color: #64748b; margin: 0.5rem 0 0 0; font-size: 0.95rem;">
                Status: 
                <span th:if="${shipment.shipmentStatus == 'CREATED'}" style="color:#64748b; font-weight: 700;">Manifest Created</span>
                <span th:if="${shipment.shipmentStatus == 'IN-TRANSIT'}" style="color:#2563eb; font-weight: 700;">In-Transit</span>
                <span th:if="${shipment.shipmentStatus == 'DELIVERED'}" style="color:#16a34a; font-weight: 700;">Delivered</span>
                <span th:if="${shipment.shipmentStatus != 'CREATED' && shipment.shipmentStatus != 'IN-TRANSIT' && shipment.shipmentStatus != 'DELIVERED'}" th:text="${shipment.shipmentStatus}" style="color:#ca8a04; font-weight: 700;">Unknown</span>
            </p>
        </div>
        <div style="display: flex; gap: 0.75rem;">
			<a th:href="@{/frontend/shipments/delete(id=${shipment.shipmentId})}" class="btn btn-delete">
			    Delete Shipment
			</a>
            <a th:href="@{/frontend/shipments}" class="btn btn-outline">Back to Board</a>
        </div>
    </div>

    <div th:if="${error}" class="error-banner" th:text="${error}"></div>
    <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>

    <div class="card-grid">
        <!-- Delivery Profile -->
        <div class="glass-card">
            <h2 class="card-title">Logistics Profile</h2>
            <div class="info-grid">
                <div>
                    <div class="info-label">Customer ID</div>
                    <div class="info-value" style="font-family:'JetBrains Mono', monospace;" th:text="${shipment.customerId}">CID</div>
                </div>
                <div>
                    <div class="info-label">Store ID</div>
                    <div class="info-value" style="font-family:'JetBrains Mono', monospace;" th:text="${shipment.storeId}">SID</div>
                </div>
                <div>
                    <div class="info-label">Delivery Address</div>
                    <div class="info-value" style="color:#2563eb;" th:text="${shipment.deliveryAddress}">Address</div>
                </div>
            </div>
        </div>

        <!-- Management Pane -->
        <div class="glass-card">
            <h2 class="card-title">Shipping Status</h2>
            <form th:action="@{/frontend/shipments/{id}/update-status(id=${shipment.shipmentId})}" method="post">
                <div class="form-group" style="margin-bottom:1.5rem;">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-control" required>
                        <option value="CREATED" th:selected="${shipment.shipmentStatus == 'CREATED'}">CREATED - Pending Pickup</option>
                        <option value="IN-TRANSIT" th:selected="${shipment.shipmentStatus == 'IN-TRANSIT'}">IN-TRANSIT - En Route</option>
                        <option value="DELIVERED" th:selected="${shipment.shipmentStatus == 'DELIVERED'}">DELIVERED - Confirmed local drop</option>
                    </select>
                    <p style="font-size:0.85rem; color:#64748b; margin-top:0.5rem; font-style: italic;">Updating status will propagate notifications to the customer record.</p>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Update Shipping Status</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
