<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Global Inventory Search</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== CONTAINER ===== */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* ===== HEADER ===== */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: #ffffff;
            padding: 1.5rem 2rem;
            border: 1px solid #dbeafe;
        }

        /* ===== TITLE ===== */
        .header-title {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
        }

        /* ===== FILTER ===== */
        .filter-form {
            background: #ffffff;
            border: 1px solid #dbeafe;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== INPUT ===== */
        .filter-input {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #000;
            padding: 0.6rem 1rem;
            border-radius: 4px;
        }

        /* ===== TABLE ===== */
        .glass-table-wrapper {
            background: #ffffff;
            border: 1px solid #dbeafe;
            margin-top: 1rem;
            overflow: hidden;
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .styled-table thead tr {
            background: #3b82f6;
            color: #ffffff;
        }

        .styled-table th,
        .styled-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .styled-table tbody tr:hover {
            background: #f8fafc;
        }

        /* ===== BADGES ===== */
        .val-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #334155;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
        }

        .btn-sm {
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
        }

        /* ERROR */
        .error-banner {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
        <div>
            <h1 class="header-title">System Inventory</h1>
            <p style="color: #475569; margin: 0.5rem 0 0 0; font-size: 0.9rem;">Global search module for product inventory levels</p>
        </div>
        <div style="display: flex; gap: 1rem;">
            <a th:href="@{/team}" class="btn btn-outline">&larr; Team</a>
            <a th:href="@{/frontend/products}" class="btn btn-outline">Products</a>
        </div>
    </div>
    
    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <form class="filter-form" th:action="@{/frontend/inventory}" method="get" style="flex: 1;">
            <b style="font-size: 0.85rem; color: #3b82f6; text-transform: uppercase;">By Product ID: </b>
            <input type="number" name="productId" placeholder="Product ID" class="filter-input" style="flex:1;" required/>
            <button type="submit" class="btn btn-outline">Query Stock</button>
        </form>
        <form class="filter-form" th:action="@{/frontend/inventory}" method="get" style="flex: 1;">
            <b style="font-size: 0.85rem; color: #10b981; text-transform: uppercase;">By Store ID: </b>
            <input type="number" name="storeId" placeholder="Store ID" class="filter-input" style="flex:1;" required/>
            <button type="submit" class="btn btn-outline">Query Location</button>
        </form>
    </div>

    <div th:if="${error}" class="error-banner" th:text="${error}"></div>

    <div class="glass-table-wrapper" th:if="${inventoryList != null}">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Inventory Record ID</th>
                    <th>Product ID</th>
                    <th>Store / Location ID</th>
                    <th>Current Stock</th>
                    <th>Location Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="inv : ${inventoryList}">
                    <td th:text="${inv.inventoryId}">1</td>
                    <td th:text="${inv.productId}">1</td>
                    <td th:text="${inv.storeId}">1</td>
                    <td><span class="val-badge" style="background: #d1fae5; color: #065f46;" th:text="${inv.productInventory}">10</span></td>
                    <td>
                        <a th:href="@{/frontend/stores/{id}(id=${inv.storeId})}" class="btn btn-outline btn-sm">Manage at Store</a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(inventoryList)}">
                    <td colspan="5" style="text-align: center; color: #94a3b8; padding: 2rem;">No inventory found for this parameter.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
