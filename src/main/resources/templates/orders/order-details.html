<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            background: #ffffff;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .header-title {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        /* ===== SUMMARY CARD ===== */
        .summary-card {
            background: #ffffff;
            border: 1px solid #dbeafe;
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .summary-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .summary-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
        }

        /* ===== ACTION FORMS ===== */
        .action-form {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            padding: 1.2rem;
            border-radius: 12px;
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 1rem;
        }

        .action-form b {
            color: #3b82f6;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .filter-input {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #000;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            flex: 1;
            font-family: inherit;
        }

        /* ===== TABLE ===== */
        .glass-table-wrapper {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .styled-table thead tr {
            background: #3b82f6;
            color: #ffffff;
        }

        .styled-table th, .styled-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .val-badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-status {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1.4rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #475569;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: #1e293b;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        .success-banner {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
        }

        h3 {
            color: #1e293b;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
       <h1 class="header-title" th:text="'Order #' + ${order != null ? order.orderId : 'N/A'}">Order Details</h1>
       <a th:href="@{/frontend/orders}" class="btn btn-outline">Back to Orders</a>
    </div>

    <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>
    
    <div th:if="${order != null}" class="summary-card">
        <div class="summary-grid">
            <div class="summary-item">
                <span class="summary-label">Customer ID</span>
                <span class="summary-value" th:text="${order.customerId}">-</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Store ID</span>
                <span class="summary-value" th:text="${order.storeId}">-</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Status</span>
                <div>
                    <span class="val-badge badge-status" th:text="${order.orderStatus}">STATUS</span>
                </div>
            </div>
            <div class="summary-item">
                <span class="summary-label">Order Placed</span>
                <span class="summary-value" th:text="${order.orderTms != null ? order.orderTms : 'Not recorded'}">Time</span>
            </div>
        </div>
        
        <form th:action="@{/frontend/orders/{id}/status(id=${order.orderId})}" method="post" class="action-form">
            <b>Modify Status:</b>
            <select name="orderStatus" class="filter-input" th:value="${order.orderStatus}">
                <option value="OPEN" th:selected="${order.orderStatus == 'OPEN'}">OPEN</option>
                <option value="PAID" th:selected="${order.orderStatus == 'PAID'}">PAID</option>
                <option value="SHIPPED" th:selected="${order.orderStatus == 'SHIPPED'}">SHIPPED</option>
                <option value="COMPLETE" th:selected="${order.orderStatus == 'COMPLETE'}">COMPLETE</option>
                <option value="CANCELLED" th:selected="${order.orderStatus == 'CANCELLED'}">CANCELLED</option>
                <option value="REFUNDED" th:selected="${order.orderStatus == 'REFUNDED'}">REFUNDED</option>
            </select>
            <button type="submit" class="btn btn-primary btn-sm">Update State</button>
        </form>
        
        <form th:action="@{/frontend/orders/{id}/shipment(id=${order.orderId})}" method="post" class="action-form" style="background: #f0fdfa; border-color: #ccfbf1;">
            <b style="color: #0d9488;">Link Shipment:</b>
            <input type="number" name="shipmentId" required class="filter-input" placeholder="Enter Shipment ID..." />
            <button type="submit" class="btn btn-primary btn-sm" style="background: #0d9488; box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.3);">Link</button>
        </form>
    </div>

    <h3 th:if="${order != null}">Checkout Manifest</h3>
    <div th:if="${order != null}" class="glass-table-wrapper">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Line Item</th>
                    <th>Product ID</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Shipment</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}">
                    <td style="color:#64748b; font-family: 'JetBrains Mono', monospace;" th:text="${item.lineItemId}"></td>
                    <td th:text="${item.productId}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td style="color: #16a34a; font-weight: 700;" th:text="'$' + ${item.unitPrice}"></td>
                    <td>
                        <span th:if="${item.shipmentId != null}" class="val-badge" style="background: #f1f5f9; color: #475569;" th:text="${item.shipmentId}"></span>
                        <span th:unless="${item.shipmentId != null}" style="color: #94a3b8; font-style: italic;">Unassigned</span>
                    </td>
                </tr>
                <tr th:if="${order.items == null || #lists.isEmpty(order.items)}">
                    <td colspan="5" style="text-align: center; color: #64748b; padding: 3rem;">No manifest items attached to this order.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
