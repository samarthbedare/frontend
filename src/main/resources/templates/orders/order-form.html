<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Order</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        /* ===== GLOBAL ===== */
        body {
            background: linear-gradient(135deg, #dbeafe, #eaf3ff);
            min-height: 100vh;
            color: #000;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: #ffffff;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            border: 1px solid #dbeafe;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .header-title {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        .form-card {
            background: #ffffff;
            border: 1px solid #dbeafe;
            padding: 2.5rem;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            color: #000;
            padding: 0.9rem 1.1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .filter-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: #ffffff;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #475569;
            background: #ffffff;
        }

        .btn-outline:hover {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #94a3b8;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .error-banner {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .item-section {
            background: #f0fdf4;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
        }

        .item-section-title {
            color: #166534;
            font-weight: 800;
            margin-bottom: 1rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            display: block;
        }

        .item-row {
            display: flex;
            gap: 1rem;
        }

        .item-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .item-label {
            font-size: 0.75rem;
            color: #166534;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
       <h1 class="header-title">Create Order</h1>
       <a th:href="@{/frontend/orders}" class="btn btn-outline">Cancel</a>
    </div>

    <div th:if="${error}" class="error-banner" th:text="${error}"></div>

    <form th:action="@{/frontend/orders}" method="post" class="form-card">
        <div class="form-group">
            <label class="form-label">Customer ID</label>
            <input type="number" name="customerId" required class="filter-input" placeholder="e.g. 101" />
        </div>
        <div class="form-group">
            <label class="form-label">Store ID</label>
            <input type="number" name="storeId" required class="filter-input" placeholder="e.g. 5" />
        </div>
        <div class="form-group">
            <label class="form-label">Delivery Address</label>
            <input type="text" name="deliveryAddress" required class="filter-input" placeholder="123 Commerce Way, Business District" />
        </div>
        
        <div class="item-section">
            <span class="item-section-title">Line Item Details</span>
            <div class="item-row">
                <div class="item-col">
                    <label class="item-label">Product ID</label>
                    <input type="number" name="productId" required class="filter-input" style="background: #ffffff; border-color: #bbf7d0;" />
                </div>
                <div class="item-col" style="flex: 0.5;">
                    <label class="item-label">Quantity</label>
                    <input type="number" name="quantity" required class="filter-input" style="background: #ffffff; border-color: #bbf7d0;" />
                </div>
                <div class="item-col">
                    <label class="item-label">Unit Price ($)</label>
                    <input type="number" step="0.01" name="unitPrice" required class="filter-input" style="background: #ffffff; border-color: #bbf7d0;" />
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Create Order</button>
    </form>
</div>
</body>
</html>
