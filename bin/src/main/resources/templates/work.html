<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${member.name} + ' — Work'">Work</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    /* ── Work-page extras ── */
    .work-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .work-avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #2a5298);
      border: 2.5px solid rgba(59,130,246,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-lt);
      box-shadow: 0 0 30px rgba(59,130,246,0.15);
      overflow: hidden;
    }
    .work-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .work-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, #f0f4ff, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .work-role-badge {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 50px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-lt);
    }

    /* Content sections */
    .work-section {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.8rem 2rem;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.55s ease forwards;
    }
    .work-section:nth-child(1) { animation-delay: 0.35s; }
    .work-section:nth-child(2) { animation-delay: 0.45s; }
    .work-section:nth-child(3) { animation-delay: 0.55s; }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-lt);
      margin-bottom: 0.65rem;
    }
    .section-body {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.65;
    }

    /* Skeleton placeholder lines -->
       Remove these once you wire real backend data */
    .skeleton-line {
      height: 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      margin-bottom: 0.5rem;
    }
    .skeleton-line:last-child { width: 60%; margin-bottom: 0; }
  </style>
</head>
<body>
<div class="glow-orb"></div>

<div class="wrapper">

  <!-- Back to team -->
  <a th:href="@{/team}" class="back-link">
    <svg width="14" height="14" fill="none" stroke="currentColor"
         stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M19 12H5M11 6l-6 6 6 6"/>
    </svg>
    Back to Team
  </a>

  <!-- Hero: big avatar + name + role -->
  <div class="work-hero">
    <div class="work-avatar">
      <img th:src="@{${member.photoUrl}}"
           th:alt="${member.name}"
           style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;"/>
    </div>
    <h1 class="work-name"   th:text="${member.name}">Member Name</h1>
    <span class="work-role-badge" th:text="${member.role}">Team Member</span>
  </div>

  <!-- Section 1: About -->
  <div class="work-section">
    <p class="section-label">About</p>
    <p class="section-body" th:text="${member.about}">
      This member's background and area of expertise.
    </p>
  </div>

  <!-- Section 2: Contributions -->
  <div class="work-section">
    <p class="section-label">Key Contributions</p>
    <ul class="section-body" style="list-style: none; padding-left: 0;">
      <li th:each="item : ${member.contributions}" style="margin-bottom: 0.5rem; display: flex; align-items: flex-start; gap: 0.5rem;">
        <span style="color: var(--accent-lt); font-weight: bold;">•</span>
        <span th:text="${item}">Contribution item</span>
      </li>
    </ul>
  </div>

  <!-- Section 3: Module / Work Area -->
  <div class="work-section">
    <p class="section-label">Module / Work Area</p>
    <p class="section-body" style="font-weight: 600; color: var(--accent-lt);" th:text="${member.module}">
      Module Name
    </p>
  </div>

  <!-- Section 4: API Catalog -->
  <div class="work-section">
    <p class="section-label">API Gateway / Endpoints</p>
    <div class="endpoint-grid" style="display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1rem;">
      <div th:each="endpoint : ${member.endpoints}" class="endpoint-card" 
           style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 0.75rem 1rem; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; display: flex; align-items: center; gap: 0.75rem;">
        <span th:with="parts=${endpoint.split(' ')}, method=${parts[0]}, path=${parts[1]}"
              th:text="${method}"
              th:classappend="${method == 'GET' ? 'method-get' : (method == 'POST' ? 'method-post' : (method == 'PATCH' || method == 'PUT' ? 'method-patch' : 'method-delete'))}"
              style="padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 800; min-width: 60px; text-align: center; color: white;">
          METHOD
        </span>
        <span style="color: #93c5fd; overflow-x: auto; white-space: nowrap;" th:text="${endpoint.split(' ')[1]}">/api/endpoint</span>
      </div>
    </div>
  </div>

  <style>
    .method-get { background: #10b981; }
    .method-post { background: #3b82f6; }
    .method-patch { background: #f59e0b; }
    .method-delete { background: #ef4444; }
    
    .endpoint-card:hover {
      border-color: var(--accent-lt) !important;
      background: rgba(59,130,246,0.05) !important;
      transform: translateX(4px);
      transition: all 0.2s ease;
    }
  </style>

  <p class="footer-note" th:text="${projectName} + ' · 2026'">Footer</p>

</div>
</body>
</html>
