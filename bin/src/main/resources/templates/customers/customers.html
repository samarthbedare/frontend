<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Database</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            animation: fadeUp 0.6s ease forwards;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.4);
        }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c4b5fd, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .filter-form {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .filter-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-family: inherit;
        }

        .glass-table-wrapper {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .styled-table thead tr {
            background: rgba(15, 23, 42, 0.8);
            color: #c4b5fd;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }

        .styled-table th,
        .styled-table td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .styled-table tbody tr {
            transition: all 0.2s ease;
        }

        .styled-table tbody tr:hover {
            background: rgba(139, 92, 246, 0.08); /* slight purple tint */
            transform: scale(1.002);
        }
        
        .val-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-email { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }
        
        .action-flex {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid rgba(148, 163, 184, 0.4);
            color: #cbd5e1;
            background: transparent;
        }

        .btn-outline:hover {
            border-color: #f1f5f9;
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139,92,246,0.4);
        }

        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }

        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
            color: white;
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex; align-items: center; gap: 1rem;
        }

        .success-banner {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex; align-items: center; gap: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="glow-orb" style="background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 60%);"></div>

<div class="dashboard-container">
    
    <div class="dashboard-header">
        <div>
            <h1 class="header-title">Customer Identities</h1>
            <p style="color: #94a3b8; margin: 0.5rem 0 0 0; font-size: 0.9rem;">
                Securely manage Customer Profiles
            </p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a th:href="@{/frontend/customers/new}" class="btn btn-primary">+ New Customer</a>
            <a th:href="@{/team}" class="btn btn-outline">&larr; Team</a>
            <a th:href="@{/work/vishal}" class="btn btn-outline">Module Details</a>
            <a th:href="@{/logout}" class="btn btn-outline" style="border-color: rgba(239,68,68,0.4); color: #fca5a5;">Logout Admin</a>
        </div>
    </div>
    
    <!-- Central Validation / Search logic mapping tool -->
    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <!-- Email Lookup -->
        <form class="filter-form" th:action="@{/frontend/customers/search}" method="get" style="flex: 1;">
            <span style="font-size: 0.85rem; font-weight: bold; color: #a78bfa; text-transform: uppercase;">By Email: </span>
            <input type="email" name="email" placeholder="user@domain.com" class="filter-input" required style="flex:1;" />
            <button type="submit" class="btn btn-outline" style="background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.4); color: #c4b5fd;">Find</button>
        </form>

        <!-- ID Lookup Layer -->
        <form class="filter-form" th:action="@{/frontend/customers/search}" method="get" style="background: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.1);">
            <span style="font-size: 0.85rem; font-weight: bold; color: #6ee7b7; text-transform: uppercase;">By ID: </span>
            <input type="number" name="id" placeholder="Ex: 5" class="filter-input" required style="width: 100px;" />
            <button type="submit" class="btn btn-outline" style="background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.4); color: #6ee7b7;">Find Profile</button>
        </form>

        <!-- Validate ID Layer -->
        <form class="filter-form" th:action="@{/frontend/customers/validate}" method="get" style="background: rgba(245, 158, 11, 0.05); border-color: rgba(245, 158, 11, 0.1);">
            <span style="font-size: 0.85rem; font-weight: bold; color: #fbbf24; text-transform: uppercase;">Validate Check: </span>
            <input type="number" name="id" placeholder="ID" class="filter-input" required style="width: 80px;" />
            <button type="submit" class="btn btn-outline" style="background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.4); color: #fcd34d;">Verify Exist</button>
        </form>
    </div>

    <!-- Alert Banners -->
    <div th:if="${error}" class="error-banner">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span th:text="${error}"></span>
    </div>

    <div th:if="${successMessage}" class="success-banner">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span th:text="${successMessage}"></span>
    </div>

    <div class="glass-table-wrapper" style="margin-top: 1rem;">
        <table class="styled-table">
            <thead>
                <tr>
                    <th>Ref ID</th>
                    <th>Full Name</th>
                    <th>Email Address</th>
                    <th>Administrative Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="customer : ${customers}">
                    <td style="font-family: 'JetBrains Mono', monospace; color: #94a3b8;" th:text="${customer.customerId}">1</td>
                    <td style="font-weight: bold; color: #fff;" th:text="${customer.fullName}">John Doe</td>
                    <td><span class="val-badge badge-email" th:text="${customer.emailAddress}">email@domain.com</span></td>
                    <td class="action-flex">
                        <a th:href="@{/frontend/customers/{id}(id=${customer.customerId})}" class="btn btn-outline btn-sm">Profile</a>
                        <a th:href="@{/frontend/customers/{id}/edit(id=${customer.customerId})}" class="btn btn-outline btn-sm" style="color: #fcd34d; border-color: rgba(252,211,77,0.3);">Modify</a>
                        <form th:action="@{/frontend/customers/{id}/delete(id=${customer.customerId})}" method="post" onsubmit="return confirm('Wipe customer from Database irreversibly?');">
                            <button type="submit" class="btn btn-delete btn-sm">Erase</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="4" style="text-align: center; color: #94a3b8; padding: 3rem;">
                        No customers returned from backend. Try creating one!
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
