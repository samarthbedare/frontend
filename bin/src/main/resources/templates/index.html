<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${projectName}">Order Inventory Management</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    /* ── Index-only layout ── */
    html, body { height: 100%; overflow: hidden; }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent-lt);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    .project-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0f4ff 0%, #93c5fd 60%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.25s;
    }

    .title-underline {
      width: 80px; height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin: 0 auto 2.5rem;
      border-radius: 2px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    /* Members card */
    .members-card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(59,130,246,0.08);
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.5s;
    }
    .members-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }
    .member-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .member-row:last-child { border-bottom: none; }
    .member-num {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      width: 24px;
      flex-shrink: 0;
    }
    .member-name-text {
      font-size: 0.95rem;
      color: var(--text);
      flex: 1;
    }
    .member-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.45;
    }

    .btn-wrap {
      margin-top: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.75s;
    }
  </style>
</head>
<body>
<div class="glow-orb"></div>

<div class="page">

  <p class="eyebrow">Team Project &middot; 2026</p>

  <!-- Project name from controller -->
  <h1 class="project-title" th:text="${projectName}">Order Inventory Management</h1>
  <div class="title-underline"></div>

  <!-- Members list card -->
  <div class="members-card">
    <p class="members-label">Team Members</p>

    <!-- th:each loops over the members list passed by the controller -->
    <div class="member-row" th:each="member : ${members}">
      <span class="member-num"    th:text="${member.paddedNumber}">01</span>
      <span class="member-name-text" th:text="${member.name}">Member Name</span>
      <span class="member-dot"></span>
    </div>
  </div>

  <!-- Button → /team -->
  <div class="btn-wrap">
    <a th:href="@{/team}" class="btn-primary">
      Meet the Team
      <svg width="16" height="16" fill="none" stroke="currentColor"
           stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </a>
  </div>

</div>
</body>
</html>
