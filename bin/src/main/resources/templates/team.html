<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${projectName} + ' — Team'">Team</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="glow-orb"></div>

<div class="wrapper">

  <!-- Back to home -->
  <a th:href="@{/}" class="back-link">
    <svg width="14" height="14" fill="none" stroke="currentColor"
         stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M19 12H5M11 6l-6 6 6 6"/>
    </svg>
    Back to Home
  </a>

  <!-- Page header -->
  <div class="page-header">
    <p class="page-eyebrow" th:text="${projectName}">Order Inventory Management</p>
    <h1 class="page-title">Meet the Team</h1>
    <div class="title-bar"></div>
  </div>

  <!--
    th:each loops over the members list.
    th:text    → renders the field value as text content.
    th:href    → builds the URL dynamically  e.g. /work/vishal
  -->
  <div class="member-card" th:each="member : ${members}">

    <!-- LEFT: avatar + number -->
    <div class="avatar-wrap">
      <div class="avatar">
        <img th:src="@{${member.photoUrl}}"
             th:alt="${member.name}"
             style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;"/>
      </div>
      <span class="member-num-badge" th:text="${member.paddedNumber}">01</span>
    </div>

    <!-- MIDDLE: name + role -->
    <div class="member-info">
      <div class="member-name" th:text="${member.name}">Member Name</div>
      <div class="member-role" th:text="${member.role}">Team Member</div>
    </div>

    <!-- RIGHT: Work button → /work/{slug} -->
    <a class="work-btn"
       th:href="@{/work/{slug}(slug=${member.workPage})}">
      Work
      <svg width="13" height="13" fill="none" stroke="currentColor"
           stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </a>

  </div>
  <!-- end th:each -->

  <p class="footer-note" th:text="${projectName} + ' · 2026'">Footer</p>

</div>
</body>
</html>
